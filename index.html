<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Hashline 🌸</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        
        #overlay {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; background: rgba(0,0,0,0.85);
        }

        #start-btn {
            padding: 18px 35px; font-size: 1.1rem; background: #ffb7c5; color: #d01d56;
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px #ffb7c5; z-index: 100;
        }

        .count { font-size: 7rem; font-weight: bold; color: #ffb7c5; display: none; text-shadow: 0 0 15px #ff69b4; }
        .msg { font-size: 2rem; display: none; text-transform: uppercase; color: #ffb7c5; text-align: center; line-height: 1.5; }

        /* THE BOOK CORNER BUTTON */
        #book-trigger {
            display: none; position: fixed; bottom: 30px; right: 30px;
            z-index: 40; font-size: 3.5rem; cursor: pointer;
            animation: bounce 2s infinite;
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* FLIPBOOK CONTAINER */
        #flipbook-container {
            display: none; position: relative; width: 300px; height: 420px;
            z-index: 20; perspective: 1500px;
        }

        .polaroid {
            position: absolute; width: 100%; height: 100%;
            background: white; padding: 10px 10px 60px 10px;
            box-sizing: border-box; border-radius: 2px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.6);
            transition: transform 0.8s ease-in-out, opacity 0.5s;
            transform-origin: left center;
        }

        .polaroid img { width: 100%; height: 100%; object-fit: cover; }

        .caption-text {
            position: absolute; bottom: 15px; width: 100%; left: 0;
            text-align: center; color: #d01d56; font-weight: bold; font-size: 1rem;
        }
    </style>
</head>
<body>

<audio id="bg-music" src="music.mp3" loop></audio>
<canvas id="stars"></canvas>
<canvas id="matrix"></canvas>

<div id="overlay">
    <button id="start-btn">FOR MY GIRL 🌸</button>
    <div id="countdown" class="count">3</div>
    <div id="m1" class="msg">Happy 19th Birthday</div>
    <div id="m2" class="msg">To My One & Only</div>
    <div id="m3" class="msg">Hashline 🌸</div>
</div>

<div id="book-trigger">🌸</div>

<div id="flipbook-container"></div>

<script>
    const mCanvas = document.getElementById('matrix');
    const mCtx = mCanvas.getContext('2d');
    const sCanvas = document.getElementById('stars');
    const sCtx = sCanvas.getContext('2d');
    const music = document.getElementById('bg-music');
    const startBtn = document.getElementById('start-btn');
    const book = document.getElementById('flipbook-container');
    const trigger = document.getElementById('book-trigger');

    mCanvas.width = sCanvas.width = window.innerWidth;
    mCanvas.height = sCanvas.height = window.innerHeight;

    // STARS & FALLING FLOWERS
    const stars = Array.from({length: 100}, () => ({x: Math.random()*sCanvas.width, y: Math.random()*sCanvas.height, r: Math.random()*1.5}));
    function drawStars() {
        sCtx.clearRect(0,0,sCanvas.width, sCanvas.height);
        sCtx.fillStyle = "white";
        stars.forEach(s => { sCtx.beginPath(); sCtx.arc(s.x, s.y, s.r, 0, Math.PI*2); sCtx.fill(); });
    }
    drawStars();

    const chars = "🌸✨HASHLINE🌸19🌸";
    const drops = Array(Math.floor(mCanvas.width/20)).fill(1);
    function drawMatrix() {
        mCtx.fillStyle = "rgba(0, 0, 0, 0.1)";
        mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
        mCtx.fillStyle = "#ffb7c5";
        mCtx.font = "20px serif";
        drops.forEach((y, i) => {
            const text = chars[Math.floor(Math.random()*chars.length)];
            mCtx.fillText(text, i*20, y*20);
            if(y*20 > mCanvas.height && Math.random() > 0.98) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(drawMatrix, 50);

    // FLIPBOOK DATA
    const captions = ["19 looks good on you 🌸", "My favorite person", "Keep shining", "Pure happiness", "Love you forever", "The most beautiful", "A special day", "Simply Hashline", "My queen 🌸", "Gorgeous!", "Always us", "The best laugh", "So lucky for you", "Forever ❤️", "Happy 19th, Hashline!"];

    // Initialize Book
    for (let i = 15; i >= 1; i--) {
        const div = document.createElement('div');
        div.className = 'polaroid';
        div.style.zIndex = 15 - i;
        div.innerHTML = `<img src="${i}.jpg"><div class="caption-text">${captions[i-1]}</div>`;
        book.appendChild(div);
    }

    // Trigger Logic
    trigger.onclick = function() {
        const topCard = book.querySelector('.polaroid:not([style*="transform: rotateY"])');
        if (topCard) {
            topCard.style.transform = "rotateY(-110deg)";
            topCard.style.opacity = "0";
            setTimeout(() => { topCard.style.display = 'none'; }, 800);
        }
    };

    startBtn.onclick = () => {
        startBtn.style.display = 'none';
        music.play();
        runSequence();
    };

    async function runSequence() {
        const count = document.getElementById('countdown');
        count.style.display = 'block';
        await new Promise(r => setTimeout(r, 1000)); count.innerText = "2";
        await new Promise(r => setTimeout(r, 1000)); count.innerText = "1";
        await new Promise(r => setTimeout(r, 1000)); count.style.display = "none";

        const ids = ['m1', 'm2', 'm3'];
        for (let id of ids) {
            let el = document.getElementById(id);
            el.style.display = "block";
            await new Promise(r => setTimeout(r, 1500));
            if (id !== 'm3') el.style.display = "none";
        }
        document.getElementById('overlay').style.background = "transparent";
        book.style.display = "block";
        trigger.style.display = "block";
    }
</script>
</body>
</html>
